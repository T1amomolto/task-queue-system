spring:
  application:
    name: task-queue-system
  datasource:
    url: jdbc:mysql://localhost:3306/task_queue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.taskqueue: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

task-queue:
  worker:
    thread-pool-size: 10
    queue-capacity: 1000
  retry:
    max-attempts: 3
    backoff-delay: 1000
  monitor:
    enabled: true
    check-interval: 60000